name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          tools: composer:v2
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src --level=5 --no-progress

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gem_vault_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          tools: composer:v2
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Create .env.test.local
        run: echo 'DATABASE_URL="postgresql://app:!ChangeMe!@127.0.0.1:5432/gem_vault_test?serverVersion=16&charset=utf8"' > .env.test.local
      - name: Create database
        run: php bin/console doctrine:database:create --env=test --if-not-exists
      - name: Run migrations
        run: php bin/console doctrine:schema:create --env=test
      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
